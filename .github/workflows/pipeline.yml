# =============================================================================
# pipeline.yml — SentinelOps-Lite CI/CD pipeline (GitHub Actions)
# Place at .github/workflows/pipeline.yml
#
# ALL values are read from GitHub Settings:
#   Variables (Settings -> Secrets and variables -> Actions -> Variables):
#     APP_NAME, ENV_NAME, DOCKERHUB_USERNAME, AWS_REGION, PYTHON_VERSION
#   Secrets (same page -> Secrets):
#     AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, DOCKERHUB_TOKEN, GEMINI_API_KEY
#
# Registry: Docker Hub. The image is pushed to
#   docker.io/<DOCKERHUB_USERNAME>/sentinelops-lite:latest
# and Dockerrun.aws.json references it. The Beanstalk URL is auto-discovered.
# Nothing is hard-coded here.
# =============================================================================

name: SentinelOps-Lite Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  APP_NAME: ${{ vars.APP_NAME }}
  ENV_NAME: ${{ vars.ENV_NAME }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION }}

jobs:
  # --------------------------------------------------------------------------
  # 1) PRE-DEPLOY REVIEW GATE
  # --------------------------------------------------------------------------
  review:
    name: Pre-deploy review (review_agent.py)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run review agent
        run: python review_agent.py

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-report
          path: review_report.txt

  # --------------------------------------------------------------------------
  # 2) BUILD + PUSH TO DOCKER HUB + DEPLOY TO ELASTIC BEANSTALK
  # --------------------------------------------------------------------------
  deploy:
    name: Build, push to Docker Hub, deploy to EB
    needs: review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ env.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Install EB CLI
        run: pip install awsebcli

      - name: Deploy (build -> Docker Hub -> EB)
        env:
          APP_NAME: ${{ env.APP_NAME }}
          ENV_NAME: ${{ env.ENV_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bash deployment/deploy.sh

  # --------------------------------------------------------------------------
  # 3) POST-DEPLOY VERIFICATION  ->  final_review.txt
  #    (auto-discovers the Beanstalk URL from the AWS credentials)
  # --------------------------------------------------------------------------
  verify:
    name: Post-deploy verification (final_agent.py)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pip install requests

      - name: Run final verification agent
        env:
          APP_NAME: ${{ env.APP_NAME }}
          ENV_NAME: ${{ env.ENV_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python final_agent.py

      - name: Upload final review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-review
          path: final_review.txt
