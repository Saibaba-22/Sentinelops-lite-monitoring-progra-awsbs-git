version: "2.4"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
    links:
      - app
      - prometheus
      - grafana
      - node-exporter
    depends_on:
      - app
      - prometheus
      - grafana
      - node-exporter
    networks:
      monitoring_net:
        aliases:
          - nginx

  app:
    image: "saibaba22/sentinelops-lite-monitoring-progra-awsbs-git:latest"
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - APP_VERSION=1.0.0
      - BUILD_NUMBER=local
      - ENVIRONMENT=production
      - METRICS_INTERVAL=5
    volumes:
      - ./logs:/app/logs
    mem_limit: 384m
    networks:
      monitoring_net:
        aliases:
          - app

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=/prometheus/
    links:
      - app
      - node-exporter
    depends_on:
      - app
      - node-exporter
    mem_limit: 256m
    networks:
      monitoring_net:
        aliases:
          - prometheus

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    links:
      - prometheus
    depends_on:
      - prometheus
    mem_limit: 256m
    networks:
      monitoring_net:
        aliases:
          - grafana

  node-exporter:
    image: prom/node-exporter:v1.8.0
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs)($|/)
    mem_limit: 64m
    networks:
      monitoring_net:
        aliases:
          - node-exporter
