version: "2.4"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - app

  app:
    image: "saibaba22/sentinelops-lite-monitoring-progra-awsbs-git:${IMAGE_TAG}"
    expose:
      - "5000"
    environment:
      - PORT=5000
      - APP_VERSION=1.0.0
      - BUILD_NUMBER=local
      - ENVIRONMENT=production
      - METRICS_INTERVAL=5
    volumes:
      - ./logs:/app/logs
    mem_limit: 384m