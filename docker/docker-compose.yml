version: "2.4"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - app

  app:
    image: "saibaba22/sentinelops-lite-monitoring-progra-awsbs-git:latest"
    expose:
      - "5000"
    environment:
      - PORT=5000
      - APP_VERSION=1.0.0
      - BUILD_NUMBER=local
      - ENVIRONMENT=production
      - METRICS_INTERVAL=5
    volumes:
      - ./logs:/app/logs
    mem_limit: 384m

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    mem_limit: 256m