# SentinelOps-Lite — local multi-container stack
# Brings up the Python app, Prometheus, Grafana, Node Exporter and an Nginx reverse proxy.
# Usage:  docker compose -f docker/docker-compose.yml up --build
version: "3.8"

services:
  # ---- Reverse proxy (public entry point) ----
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - monitor
    restart: unless-stopped

  # ---- Python Flask application ----
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - PORT=5000
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - BUILD_NUMBER=${BUILD_NUMBER:-local}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - METRICS_INTERVAL=5
    expose:
      - "5000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - prometheus
    networks:
      - monitor
    restart: unless-stopped

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - monitor
    restart: unless-stopped

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboards.json:/etc/grafana/provisioning/dashboards/overview.json:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/domain:ro
    depends_on:
      - prometheus
    networks:
      - monitor
    restart: unless-stopped

  # ---- Node Exporter ----
  node-exporter:
    image: prom/node-exporter:v1.8.0
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs)($$|/)"
    expose:
      - "9100"
    networks:
      - monitor
    restart: unless-stopped

networks:
  monitor:
    driver: bridge
