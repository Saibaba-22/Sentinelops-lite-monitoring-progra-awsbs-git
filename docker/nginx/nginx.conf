map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    set $app_upstream app:5000;
    set $prometheus_upstream prometheus:9090;
    set $grafana_upstream grafana:3000;
    set $node_exporter_upstream node-exporter:9100;

    location / {
        proxy_pass http://$app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        proxy_pass http://$app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /prometheus {
        return 301 /prometheus/;
    }

    location /prometheus/ {
        rewrite ^/prometheus/?(.*)$ /$1 break;
        proxy_pass http://$prometheus_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/api/live/ {
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ {
        proxy_pass http://$grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /node-exporter {
        return 301 /node-exporter/metrics;
    }

    location = /node-exporter/ {
        return 301 /node-exporter/metrics;
    }

    location /node-exporter/ {
        rewrite ^/node-exporter/?(.*)$ /$1 break;
        proxy_pass http://$node_exporter_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}