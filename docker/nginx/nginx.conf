server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    # ─── App (still linked) ──────────────────────────────────────
    location / {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        proxy_pass         http://app:5000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Prometheus via host bridge ──────────────────────────────
    location = /prometheus {
        return 301 /prometheus/;
    }

    location /prometheus/ {
        proxy_pass         http://172.17.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ─── Grafana via host bridge ──────────────────────────────────
    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        proxy_pass         http://172.17.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # ─── Node Exporter via host bridge ───────────────────────────
    location = /node-exporter {
        return 301 /node-exporter/metrics;
    }

    location /node-exporter/metrics {
        proxy_pass         http://172.17.0.1:9100/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}