# ── resolver needed for Docker link DNS ──────────────────────────
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    # ─── App ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    location /metrics {
        proxy_pass         http://app:5000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Prometheus ──────────────────────────────────────────────
    location = /prometheus {
        return 301 /prometheus/;
    }

    location /prometheus/ {
        proxy_pass         http://prometheus:9090/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;

        # fix sub_filter for prometheus assets
        proxy_redirect     off;
        sub_filter_once    off;
    }

    # ─── Grafana ─────────────────────────────────────────────────
    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_redirect     off;
    }

    # ─── Node Exporter ───────────────────────────────────────────
    location = /node-exporter {
        return 301 /node-exporter/metrics;
    }

    location /node-exporter/metrics {
        proxy_pass         http://node-exporter:9100/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}