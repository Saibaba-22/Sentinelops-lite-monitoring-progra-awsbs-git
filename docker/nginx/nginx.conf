server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    # 1. Frontend App Proxy
    location / {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. App Metrics Proxy
    location /metrics {
        proxy_pass http://app:5000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Prometheus Proxy
    location = /prometheus {
        return 301 /prometheus/;
    }

    location /prometheus/ {
        proxy_pass http://prometheus:9090; # FIX: Changed from 'localhost:9090' to 'prometheus:9090'
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Grafana Proxy
    location = /grafana {
        return 301 /grafana/; # FIX: Redirecting to '/grafana/' lets Grafana handle its own routing
    }

    location /grafana/ {
        proxy_pass http://grafana:3000; # FIX: Changed from 'app:3000/' (wrong host) to 'grafana:3000' (no trailing slash)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSockets for Grafana Live
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 5. Node Exporter Proxy
    location = /node-exporter {
        return 301 /node-exporter/metrics;
    }

    location = /node-exporter/metrics {
        proxy_pass http://node-exporter:9100/metrics; # FIX: Changed from 'app:9100/metrics' (wrong host) to 'node-exporter:9100/metrics'
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
