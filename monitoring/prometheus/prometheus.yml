# SentinelOps-Lite — Prometheus configuration
# Scrape targets match the Docker Compose / Elastic Beanstalk service names.
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    monitor: sentinelops-lite

# Alertmanager is optional; rules still evaluate without it.
#alerting:
#  alertmanagers:
#    - static_configs:
#        - targets: ["alertmanager:9093"]

#rule_files:
#  - /etc/prometheus/alert.rules.yml
#  - /etc/prometheus/recording.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: flask-app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:5000"]
        labels:
          service: sentinelops-lite

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: infrastructure