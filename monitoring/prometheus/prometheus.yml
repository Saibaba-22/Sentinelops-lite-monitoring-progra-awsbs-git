# SentinelOps-Lite — Prometheus configuration
# Scrape targets match the Docker Compose / Elastic Beanstalk service names.
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    monitor: sentinelops-lite

# Alertmanager is optional; rules still evaluate without it.
#alerting:
#  alertmanagers:
#    - static_configs:
#        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert.rules.yml
  - /etc/prometheus/recording.rules.yml

scrape_configs:
  - job_name: 'flask-app'
    static_configs:
      - targets: ['app:5000']        # ✅ container name via docker link
    metrics_path: /metrics
    labels: {}
    relabel_configs: []
    params: {}
    scheme: http

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']  # ✅ container name via docker link
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']      # ✅ prometheus scrapes itself
    metrics_path: /prometheus/metrics   # ✅ because --web.external-url=/prometheus/
