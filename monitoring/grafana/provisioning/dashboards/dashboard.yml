apiVersion: 1

providers:
  - name: "SentinelOps-Lite"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Dashboards are mounted here by Docker / Elastic Beanstalk.
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
